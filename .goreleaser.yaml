# goreleaser v2 config. Produces:
#   - linux amd64 + arm64 binaries
#   - tar.gz archives
#   - .deb packages (via nfpm)
#   - checksums.txt
# Invoked from .github/workflows/release.yml on tag push.

version: 2
project_name: o3ui

before:
  hooks:
    - go mod tidy

builds:
  - id: o3ui
    main: ./cmd/openvpn3ui-tui
    binary: o3ui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: o3ui
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - id: o3ui-deb
    package_name: o3ui
    vendor: esivres
    homepage: https://github.com/esivres/o3ui
    maintainer: Aleksandr Usov <esivres@gmail.com>
    description: |-
      OpenVPN3 controller — Bubble Tea TUI and Cinnamon desklet, driven by
      openvpn3-linux over D-Bus. Includes TOTP auto-fill, secret-service
      credential storage, and a status CLI for scripting.
    license: MIT
    formats:
      - deb
    bindir: /usr/bin
    section: net
    priority: optional
    # openvpn3-linux is the actual VPN backend; we depend on it being
    # present on the target system. Soft-recommend cinnamon — the binary
    # is useful even without it (TUI works anywhere).
    dependencies:
      - openvpn3
    recommends:
      - cinnamon
      - libsecret-1-0
    contents:
      # Shell completions — installed into the standard vendor dirs
      # so bash-completion / zsh's compinit / fish pick them up on
      # next shell start with no user action needed.
      - src: completions/o3ui.bash
        dst: /usr/share/bash-completion/completions/o3ui
        file_info:
          mode: 0644
      - src: completions/_o3ui
        dst: /usr/share/zsh/vendor-completions/_o3ui
        file_info:
          mode: 0644
      - src: completions/o3ui.fish
        dst: /usr/share/fish/vendor_completions.d/o3ui.fish
        file_info:
          mode: 0644
      # Cinnamon desklet, system-wide. /usr/share/cinnamon/desklets is
      # the second discovery root after ~/.local/share/cinnamon/desklets,
      # so dropping the bundle here makes the desklet immediately
      # visible in System Settings → Desklets on Mint — no per-user
      # `o3ui desklet install` step required. Harmless on non-Cinnamon
      # systems (the directory just sits there).
      - src: internal/cli/desklet/o3ui@esivres/metadata.json
        dst: /usr/share/cinnamon/desklets/o3ui@esivres/metadata.json
        file_info:
          mode: 0644
      - src: internal/cli/desklet/o3ui@esivres/desklet.js
        dst: /usr/share/cinnamon/desklets/o3ui@esivres/desklet.js
        file_info:
          mode: 0644
      - src: internal/cli/desklet/o3ui@esivres/stylesheet.css
        dst: /usr/share/cinnamon/desklets/o3ui@esivres/stylesheet.css
        file_info:
          mode: 0644
      - src: internal/cli/desklet/o3ui@esivres/settings-schema.json
        dst: /usr/share/cinnamon/desklets/o3ui@esivres/settings-schema.json
        file_info:
          mode: 0644
      - src: internal/cli/desklet/o3ui@esivres/icon.png
        dst: /usr/share/cinnamon/desklets/o3ui@esivres/icon.png
        file_info:
          mode: 0644
      - src: internal/cli/desklet/o3ui@esivres/icon.svg
        dst: /usr/share/cinnamon/desklets/o3ui@esivres/icon.svg
        file_info:
          mode: 0644
    scripts:
      # Postinstall whispers a hint when Cinnamon is detected — no
      # destructive auto-enable (that would write into the user's
      # dconf without consent), just point at the right setting.
      postinstall: scripts/postinstall.sh
    deb:
      compression: zstd

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"

release:
  github:
    owner: esivres
    name: o3ui
  draft: false
  prerelease: auto
